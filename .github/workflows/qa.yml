name: "Code QA Checks"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - synchronize
      - opened
      - ready_for_review
      - reopened
      - review_requested

jobs:
  qa:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prepare module + playground stubs
        run: pnpm dev:prepare

      - name: Type-check
        run: pnpm test:types

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm prepack
